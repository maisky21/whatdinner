<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7106063268781346" crossorigin="anonymous"></script>
    <title>오늘의 미식 운세 - AI 저녁 메뉴 추천 및 음식 운세 서비스</title>
    <meta name="google-site-verification" content="google7fa7fe8330d0be46" />
    <meta name="description" content="오늘 저녁 뭐 먹지? 당신의 운세에 맞는 완벽한 저녁 메뉴를 추천해 드립니다. AI 기반 저녁 메뉴 추천, 음식 궁합, 오늘의 운세 팁까지 제공하는 전문 미식 큐레이션 서비스.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- html2canvas for image generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 상단 헤더 (브랜드 로고, 언어, 테마) -->
        <header class="app-header">
            <div class="header-content">
                <a href="/" class="logo-link">
                    <span class="logo shine-effect">✨ cosmic_fortune</span>
                </a>
                <div class="header-actions">
                    <button id="lang-toggle" class="lang-btn">EN</button>
                    <button id="theme-toggle" class="icon-btn" aria-label="Theme Toggle">🌞</button>
                </div>
            </div>
        </header>

        <!-- 카테고리 스토리 탭 (상단 고정 및 중앙 정렬) -->
        <nav id="story-tabs" class="story-container">
            <div class="story-item active" data-category="전체">
                <div class="story-circle"><span class="story-icon">✨</span></div>
                <span class="story-label" data-i18n="cat_all">전체</span>
            </div>
            <div class="story-item" data-category="한식">
                <div class="story-circle"><span class="story-icon">🥘</span></div>
                <span class="story-label" data-i18n="cat_kr">한식</span>
            </div>
            <div class="story-item" data-category="양식">
                <div class="story-circle"><span class="story-icon">🍝</span></div>
                <span class="story-label" data-i18n="cat_we">양식</span>
            </div>
            <div class="story-item" data-category="일식">
                <div class="story-circle"><span class="story-icon">🍣</span></div>
                <span class="story-label" data-i18n="cat_jp">일식</span>
            </div>
            <div class="story-item" data-category="중식">
                <div class="story-circle"><span class="story-icon">🥟</span></div>
                <span class="story-label" data-i18n="cat_ch">중식</span>
            </div>
            <div class="story-item" data-category="간단식">
                <div class="story-circle"><span class="story-icon">🥪</span></div>
                <span class="story-label" data-i18n="cat_si">간단식</span>
            </div>
        </nav>

        <!-- 초기 화면 -->
        <main id="home-screen" class="centered-content">
            <div class="glass-card intro-card">
                <h1 class="main-title" data-i18n="main_title">오늘의 미식 운세</h1>
                <p class="subtitle" data-i18n="main_subtitle">오늘 저녁, 당신의 운명이 이끄는 맛은?</p>
                <div class="input-group">
                    <input type="text" id="user-name" placeholder="보내는 사람 (예: 아빠가, 엄마가)" maxlength="10">
                    <button id="random-name-btn" class="random-btn" aria-label="Random Nickname">🎲</button>
                </div>
                <button id="draw-btn" class="primary-btn" data-i18n="btn_draw">운세 뽑기</button>
            </div>
        </main>

        <!-- 결과 화면 (Instagram Post Style) -->
        <main id="result-screen" class="centered-content hidden">
            <div class="insta-post result-card">
                <!-- Post Header -->
                <div class="post-header">
                    <div class="user-avatar">✨</div>
                    <div class="user-info">
                        <span class="username">cosmic_fortune</span>
                        <span class="location" data-i18n="location">미식의 우주</span>
                    </div>
                    <div class="post-options"><i class="fas fa-ellipsis-h"></i></div>
                </div>

                <!-- Post Image (Emoji Container) -->
                <div class="post-media emoji-container">
                    <div class="soft-circle"></div>
                    <span id="menu-emoji"></span>
                </div>

                <!-- Menu Title Section (Large & Bold) -->
                <div class="menu-title-section">
                    <h2 id="menu-name">메뉴명</h2>
                </div>

                <!-- Post Actions -->
                <div class="post-actions">
                    <div class="main-actions">
                        <i class="far fa-heart heart-btn"></i>
                        <i class="far fa-comment"></i>
                        <i class="far fa-paper-plane"></i>
                    </div>
                    <div class="bookmark-action">
                        <i class="far fa-bookmark"></i>
                    </div>
                </div>

                <!-- Post Content -->
                <div class="post-content">
                    <div class="likes-count"><span data-i18n="likes_prefix">좋아요</span> 1,234<span data-i18n="likes_suffix">개</span></div>
                    <div class="caption">
                        <span class="caption-user">cosmic_fortune</span>
                        <span id="menu-category" class="post-tag">#한식</span>
                        <span class="recommended-text" data-i18n="recommended_label">오늘의 추천 메뉴</span>
                        <p id="menu-fortune" class="post-description">오늘 당신의 미식 운세는...</p>
                        <div id="menu-lucky-tip" class="post-lucky-tip">
                            <!-- JS will populate this -->
                        </div>
                        <div id="sender-display" class="sender-info">
                            <!-- JS will populate this if name is provided -->
                        </div>
                    </div>
                    <div class="post-time" data-i18n="just_now">방금 전</div>
                </div>

                <!-- Post Footer Button -->
                <div class="post-footer-btn">
                    <button id="retry-btn" class="secondary-btn" data-i18n="btn_retry">다른 운세 확인하기</button>
                    <button id="save-btn" class="icon-save-btn" aria-label="Save as Image">📸</button>
                </div>
            </div>
        </main>

        <!-- 이미지 저장 모달 -->
        <div id="image-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3 data-i18n="save_title">이미지 저장</h3>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <p class="guide-text animate-glow" data-i18n="save_guide">이미지를 꾹 눌러 저장하세요! 📸</p>
                    <div id="preview-container">
                        <!-- Generated image will be inserted here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="close-modal-btn" class="primary-btn mini">닫기</button>
                </div>
            </div>
        </div>

        <!-- 푸터 -->
        <footer>
            <div class="footer-links">
                <a href="about.html" target="_blank" data-i18n="footer_about">서비스 소개</a>
                <span class="divider">|</span>
                <a href="privacy.html" target="_blank" data-i18n="footer_privacy">개인정보처리방침</a>
                <span class="divider">|</span>
                <a href="terms.html" target="_blank" data-i18n="footer_terms">이용약관</a>
            </div>
            <p class="copyright">&copy; 2024 cosmic_fortune. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
